# https://github.com/conda-forge/conda-forge-pinning-feedstock/blob/main/recipe/conda_build_config.yaml

llvm_version:
  - 18
  - 19
  - 20
  - 21

build_mode:
  - cpp
  - python

# Dr.Jit's Metal backend uses Metal APIs introduced in macOS 15.0.
MACOSX_SDK_VERSION:  # [osx and arm64]
  - '15.5'           # [osx and arm64]

c_stdlib_version:  # [osx and arm64]
  - '15.0'         # [osx and arm64]

c_stdlib_version:  # [linux]
  - '2.17'         # [linux]
  - '2.17'         # [linux]

cuda_compiler_version:         # [linux or win]
  - None                       # [linux or win]
  - '12.9'                     # [linux or win]

cuda_compiler_version_min:     # [linux or win]
  - None                       # [linux or win]
  - '12.9'                     # [linux or win]

cudnn:                         # [linux or win]
  - None                       # [linux or win]
  - '9'                        # [linux or win]

c_compiler_version:            # [linux]
  - '14'                       # [linux]
  - '14'                       # [linux]

cxx_compiler_version:          # [linux]
  - '14'                       # [linux]
  - '14'                       # [linux]

fortran_compiler_version:      # [linux]
  - '14'                       # [linux]
  - '14'                       # [linux]
